
config settings 'settings'
	option enabled '1'
	option dns_type 'doh'
	option dns_server '1.1.1.1'
	option bootstrap_dns_server '77.88.8.8'
	option cache_path '/etc/sing-box/cache.db'
	option config_schema_version '1'

config section 'custom'
	option connection_type 'proxy'
	option proxy_config_type 'outbound'
	option outbound_json '{"type":"socks","server":"127.0.0.1","server_port":1080,"version":"5"}'
