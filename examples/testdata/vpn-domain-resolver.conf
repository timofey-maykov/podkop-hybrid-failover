
config settings 'settings'
	option enabled '1'
	option dns_type 'doh'
	option dns_server '1.1.1.1'
	option bootstrap_dns_server '77.88.8.8'
	option cache_path '/etc/sing-box/cache.db'
	option config_schema_version '1'

config section 'vpndr'
	option connection_type 'vpn'
	option interface 'awg0'
	option domain_resolver_enabled '1'
	option domain_resolver_dns_type 'udp'
	option domain_resolver_dns_server '8.8.8.8'
