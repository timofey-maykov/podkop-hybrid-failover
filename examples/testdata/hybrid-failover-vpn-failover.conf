
config settings 'settings'
	option enabled '1'
	option dns_type 'doh'
	option dns_server '1.1.1.1'
	option bootstrap_dns_server '77.88.8.8'
	option cache_path '/etc/sing-box/cache.db'
	option config_schema_version '1'

config section 'glob'
	option connection_type 'vpn'
	option interface 'awg0'
	option failover_vpn_enabled '1'
	option urltest_check_interval '30s'
	option urltest_idle_timeout '5m'
	option urltest_tolerance '50'
	list failover_proxy_links 'vless://11111111-1111-1111-1111-111111111111@example.com:443?encryption=none&security=reality&sni=example.com&fp=chrome&pbk=VDx8FnyKEJntMxyrVqRXJqfdhnnz9tNTsQr064RBTWU&sid=abcd&type=tcp'
