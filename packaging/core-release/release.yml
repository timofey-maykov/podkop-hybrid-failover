# Synced to openwrt-hybrid-failover-core via scripts/export-go-repo.sh
name: Release packages

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Tag to publish assets to (manual rebuild, e.g. v1.5.0)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # Manual rebuild: build from main, attach assets to an existing release tag.
          ref: ${{ github.event_name == 'workflow_dispatch' && 'main' || github.ref }}

      - uses: actions/setup-go@v6
        with:
          go-version: '1.22'
          cache-dependency-path: |
            go.sum
            bot/go.sum

      - name: Build .ipk and .apk (core + bot)
        env:
          HF_PKG_FORMAT: both
          HF_BUILD_SET: core
        run: |
          chmod +x scripts/build-packages.sh scripts/lib/*.sh
          ./scripts/build-packages.sh

      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.release_tag != ''
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.inputs.release_tag != '' && github.event.inputs.release_tag || github.ref_name }}
          files: |
            dist/ipk/*
            dist/apk/*
            dist/manifest.json
          generate_release_notes: true

      - name: Upload artifacts (branch push)
        if: "!startsWith(github.ref, 'refs/tags/') && github.event.inputs.release_tag == ''"
        uses: actions/upload-artifact@v6
        with:
          name: openwrt-core-packages
          path: |
            dist/ipk/*.ipk
            dist/apk/*.apk
            dist/manifest.json
